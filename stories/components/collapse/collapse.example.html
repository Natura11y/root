<button
  class="button"
  data-toggle="collapse"
  aria-controls="collapse-html"
  aria-expanded="false"
>
  Show
</button>

<div class="collapse" id="collapse-html">
  <div class="padding-3 border">
    <p>
      This content collapses and expands. Never put padding directly on the
      Collapse element. Always put it on a child inside.
    </p>
  </div>
</div>
