<section
  class="track"
  aria-labelledby="carousel-heading"
>
  <h3 id="carousel-heading" class="screen-reader-only">Section Title</h3>

  <div class="track__container">
    <ul class="track__panels gap-2">
      <li class="track__panel">
        <img src="story-assets/backdrop/landscape.jpg" alt="Snowy mountain ridge at sunset" />
      </li>
      <li class="track__panel">
        <img src="story-assets/backdrop/video-1-thumbnail.jpg" alt="Person walking through a misty landscape" />
      </li>
      <li class="track__panel">
        <img src="story-assets/backdrop/video-2-thumbnail.jpg" alt="Person standing near a mountain lake" />
      </li>
    </ul>
  </div>

  <div class="track__controls margin-y-3">
    <button
      class="track__prev button button--icon-only"
      aria-label="Previous Slide"
      data-track-prev
    >
      <span class="icon icon-arrow-left" aria-hidden="true"></span>
    </button>

    <ul class="track__pagination" data-track-pagination></ul>

    <button
      class="track__next button button--icon-only"
      aria-label="Next Slide"
      data-track-next
    >
      <span class="icon icon-arrow-right" aria-hidden="true"></span>
    </button>
  </div>
</section>
