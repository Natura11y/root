<div class="grid grid--column-2--md gap-3">
  <div class="grid gap-2">
    <p class="font-size-sm font-weight-bold">Auto</p>
    <div class="border border-radius-2 overflow-auto" style="height: 8rem;">
      <div class="theme-primary padding-3" style="width: 20rem; height: 12rem;">
        Content scrolls only when needed.
      </div>
    </div>
  </div>

  <div class="grid gap-2">
    <p class="font-size-sm font-weight-bold">Visible</p>
    <div style="padding-right: 3rem; padding-bottom: 3rem;">
      <div class="border border-radius-2 overflow-visible" style="height: 8rem;">
        <div class="theme-primary padding-3 border-radius-1" style="width: 120%; transform: translate(1rem, 1rem);">
          Content can extend outside the box.
        </div>
      </div>
    </div>
  </div>

  <div class="grid gap-2">
    <p class="font-size-sm font-weight-bold">Hidden</p>
    <div class="border border-radius-2 overflow-hidden" style="height: 8rem;">
      <div class="theme-primary padding-3" style="height: 14rem;">
        Extra content is clipped by the box.
      </div>
    </div>
  </div>

  <div class="grid gap-2">
    <p class="font-size-sm font-weight-bold">Horizontal Scroll</p>
    <div class="border border-radius-2 overflow-x-scroll">
      <div class="theme-primary padding-3" style="width: 36rem;">
        Wide content scrolls on the x-axis.
      </div>
    </div>
  </div>

  <div class="grid gap-2">
    <p class="font-size-sm font-weight-bold">Vertical Scroll</p>
    <div class="border border-radius-2 overflow-y-scroll" style="height: 8rem;">
      <div class="theme-primary padding-3" style="height: 14rem;">
        Tall content scrolls on the y-axis.
      </div>
    </div>
  </div>
</div>
