<form>
  <div class="form-entry">
    <label class="form-entry__label" for="form-entry-html">Full name</label>

    <div class="form-entry__field">
      <span class="form-entry__field__input">
        <input
          type="text"
          id="form-entry-html"
          name="fullName"
          aria-describedby="form-entry-html-help"
        />
      </span>

      <div class="form-entry__field__message" id="form-entry-html-help">
        Enter your first and last name.
      </div>
    </div>
  </div>
</form>
