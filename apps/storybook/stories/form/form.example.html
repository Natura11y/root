<form>
  <div class="form-entry">
    <label class="form-entry__field">
      <span class="form-entry__field__label">
        Full name
      </span>

      <span class="form-entry__field__input">
        <input
          type="text"
          id="form-entry-html"
          name="fullName"
          aria-describedby="help-form-entry-html"
        />
      </span>
    </label>

    <small class="form-entry__help" id="help-form-entry-html">
      Enter your first and last name.
    </small>
  </div>
