<div class="container medium margin-x-auto">
  <div class="grid gap-3">
    <div class="card theme-canvas border border-radius-2">
      <div class="card__head border-bottom">
        <p><strong>Background Color Utilities</strong></p>
      </div>

      <div class="card__body">
        <div class="grid grid--column-5 gap-2 text-align-center font-size-sm">
          <div>
            <div class="aspect-ratio-1x1 background-color-primary border-radius-1"></div>
            <p class="margin-top-1">Primary</p>
          </div>
          <div>
            <div class="aspect-ratio-1x1 background-color-secondary border-radius-1"></div>
            <p class="margin-top-1">Secondary</p>
          </div>
          <div>
            <div class="aspect-ratio-1x1 background-color-dark border-radius-1"></div>
            <p class="margin-top-1">Dark</p>
          </div>
          <div>
            <div class="aspect-ratio-1x1 background-color-light border border-radius-1"></div>
            <p class="margin-top-1">Light</p>
          </div>
          <div>
            <div class="aspect-ratio-1x1 background-color-canvas border border-radius-1"></div>
            <p class="margin-top-1">Canvas</p>
          </div>
        </div>
      </div>
    </div>

    <div class="grid grid--column-2--md gap-3">
      <div class="card theme-canvas border border-radius-2">
        <div class="card__head border-bottom">
          <p><strong>Text Color Utilities</strong></p>
        </div>

        <div class="card__body">
          <p class="font-size-rg text-color-primary">Primary text</p>
          <p class="font-size-rg text-color-secondary">Secondary text</p>
          <p class="font-size-rg text-color-dark">Dark text</p>
          <p class="font-size-rg text-color-link">Link text</p>
        </div>
      </div>

      <div class="card theme-dark border-radius-2">
        <div class="card__head border-bottom">
          <p><strong>Text On Dark</strong></p>
        </div>

        <div class="card__body">
          <p class="font-size-rg text-color-light">Light text</p>
          <p class="font-size-rg text-color-canvas">Canvas text</p>
          <p class="font-size-rg text-color-link">Link text</p>
        </div>
      </div>
    </div>

    <div class="grid grid--column-2--md gap-3">
      <div class="card theme-canvas border border-radius-2">
        <div class="card__head border-bottom">
          <p><strong>Subtle Fill On Canvas</strong></p>
        </div>

        <div class="card__body grid gap-2">
          <div class="subtle-fill-1 padding-3 border-radius-1">Subtle fill 1</div>
          <div class="subtle-fill-2 padding-3 border-radius-1">Subtle fill 2</div>
        </div>
      </div>

      <div class="card theme-dark border-radius-2">
        <div class="card__head border-bottom">
          <p><strong>Subtle Fill On Dark</strong></p>
        </div>

        <div class="card__body grid gap-2">
          <div class="subtle-fill-1 padding-3 border-radius-1">Subtle fill 1</div>
          <div class="subtle-fill-2 padding-3 border-radius-1">Subtle fill 2</div>
        </div>
      </div>
    </div>
  </div>
</div>
