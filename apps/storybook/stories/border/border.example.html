    <div class="padding-3 subtle-fill-1 border">
      <p class="font-size-sm">All sides</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-top">
      <p class="font-size-sm">Top side</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-right">
      <p class="font-size-sm">Right side</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-bottom">
      <p class="font-size-sm">Bottom side</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-left">
      <p class="font-size-sm">Left side</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-y">
      <p class="font-size-sm">Top and bottom</p>
    </div>

    <div class="padding-3 subtle-fill-1 border-x">
