<div class="container medium margin-x-auto">
  <div class="grid gap-3">
    <div>
      <p class="h6 margin-bottom-2">Border Colors</p>

      <div class="grid grid--column-3--md gap-2 text-align-center">
        <div class="padding-3 subtle-fill-1 border border-color-primary">
          <p>Primary</p>
        </div>

        <div class="padding-3 subtle-fill-1 border border-color-secondary">
          <p>Secondary</p>
        </div>

        <div class="padding-3 subtle-fill-1 border border-color-dark">
          <p>Dark</p>
        </div>

        <div class="padding-3 theme-dark border border-color-light">
          <p>Light</p>
        </div>

        <div class="padding-3 theme-dark border border-color-canvas">
          <p>Canvas</p>
        </div>
      </div>
    </div>

    <div>
      <p class="h6 margin-bottom-2">Directional Border Colors</p>

      <div class="grid grid--column-2--md gap-2 text-align-center">
        <div class="padding-3 subtle-fill-1 border border-block-start-color-primary">
          <p>Block start</p>
        </div>

        <div class="padding-3 subtle-fill-1 border border-right-color-secondary">
          <p>Right side</p>
        </div>

        <div class="padding-3 subtle-fill-1 border border-block-end-color-dark">
          <p>Block end</p>
        </div>

        <div class="padding-3 theme-dark border border-left-color-canvas">
          <p>Left side</p>
        </div>
      </div>
    </div>
  </div>
</div>
