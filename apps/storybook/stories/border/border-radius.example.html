<div class="container medium margin-x-auto" style="--border-color: currentColor;">
  <div class="grid gap-3">
    <div>
      <p class="h6 margin-bottom-2">Border Radius Sizes</p>

      <div class="grid grid--column-6 gap-2">
        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-0 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">None</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-1 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Small</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Regular</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-3 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Large</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-pill margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Pill</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-circle margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Circle</p>
        </div>
      </div>
    </div>

    <div>
      <p class="h6 margin-bottom-2">Directional Border Radius</p>

      <div class="grid grid--column-8 gap-2">
        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-top-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Top</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-right-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Right</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-bottom-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Bottom</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-left-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Left</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-top-left-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Top left</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-top-right-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Top right</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-bottom-right-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Bottom right</p>
        </div>

        <div>
          <div class="aspect-ratio-1x1 subtle-fill-1 border border-radius-bottom-left-2 margin-bottom-1"></div>
          <p class="font-size-sm text-align-center">Bottom left</p>
        </div>
      </div>
    </div>
  </div>
</div>
