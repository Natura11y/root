<button
  class="button theme-primary"
  data-modal="open"
  aria-controls="modal-html"
>
  Open Modal
</button>

<div
  class="modal padding-2"
  id="modal-html"
  aria-hidden="true"
  data-modal-close-outside="true"
>
  <div
    class="modal__content narrow border-radius-2 box-shadow-3"
    aria-labelledby="modal-html-title"
    role="dialog"
  >
    <header class="modal__content__head border-bottom">
      <h2 class="h6" id="modal-html-title">Modal Title</h2>
      <button class="button button--icon-only font-size-md" data-modal-close>
        <span class="icon icon-close" aria-hidden="true"></span>
      </button>
    </header>

    <main class="modal__content__body">
      <p>Modal body content goes here. The focus is trapped inside while open.</p>
    </main>
  </div>
</div>
