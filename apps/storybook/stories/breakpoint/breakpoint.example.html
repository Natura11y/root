<div class="container narrow margin-x-auto">

    <table class="table table--edge">
      <caption class="screen-reader-only">Natura11y breakpoints</caption>
      <thead>
        <tr>
          <th scope="col">Name</th>
          <th scope="col">Modifier</th>
