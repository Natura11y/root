
<!DOCTYPE html>

<html lang="en" dir="ltr">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <title>Container • Natura11y</title>
        
        <!-- Natura11y Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/natura11y-icons@v2/dist/natura11y-icons.min.css">

    </head>

    <body>

        <main>

            <section>

                <header class="margin-y-4 text-align-center">
                    <h1 class="banner-headline">
                        Container
                    </h1>
                </header>
                
                <div class="grid gap-3" style="--border-color: currentColor;">

                    <div class="container">
                        <div class="border subtle-fill-1 border-radius-2 padding-3">
                            Default container
                        </div>
                    </div>

                    <div class="container narrow">
                        <div class="border subtle-fill-1 border-radius-2 padding-3">
                            Narrow width
                        </div>
                    </div>

                    <div class="container medium">
                        <div class="border subtle-fill-1 border-radius-2 padding-3">
                            Medium width
                        </div>
                    </div>

                    <div class="container wide">
                        <div class="border subtle-fill-1 border-radius-2 padding-3">
                            Wide width
                        </div>
                    </div>

                    <div class="container narrow medium--lg wide--xl">
                        <div class="border subtle-fill-1 border-radius-2 padding-3">
                            Narrow, then medium at large, then wide at extra large
                        </div>
                    </div>

                </div>

            </section>

        </main>

    </body>

</html>
